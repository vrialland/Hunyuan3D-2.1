services:
  hunyuan3d:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: hunyuan3d21:latest
    container_name: hy3d21
    ports:
      - "7860:7860"
    stdin_open: true
    tty: true
    command: ["python", "gradio_app.py", "--port", "7860"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
